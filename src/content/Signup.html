<main class="bg-background-5">
      <!-- signup form -->
<section class="pt-34 pb-12 2xl:pt-44">
  <div class="main-container">
    <div
      class="mx-auto w-full rounded-lg bg-[url('/images/gradient/opai-1.png')] bg-cover bg-center bg-no-repeat p-4 bg-blend-lighten lg:p-20 xl:p-28 2xl:p-39"
    >
      <div
        class="flex flex-col items-stretch justify-center gap-y-12 lg:flex-row lg:gap-x-8 2xl:gap-x-12"
      >
        <div class="w-full space-y-8 lg:w-1/2 xl:w-auto">
          <div class="space-y-3 text-center lg:text-left">
            <h2
              data-opai-animate
              data-delay="0.1"
              data-instant
              class="text-is-heading-2 font-normal text-white"
            >
              Let’s get started
            </h2>
            <p
              data-opai-animate
              data-delay="0.2"
              data-instant
              class="text-tagline-2 font-inter-tight mx-auto w-full max-w-[330px] text-center font-normal text-white/60 lg:mx-0 lg:text-left"
            >
              Let’s explore how Ezitech can support your goals with AI-driven
              solutions.
            </p>
          </div>
          <div
            data-opai-animate
            data-delay="0.3"
            data-instant
            class="hidden h-fit w-full max-w-[509px] flex-1 flex-col lg:flex"
          >
            <figure class="block h-full overflow-hidden rounded-lg">
              <img
                src="/images/opai-img-48.png"
                alt="login-hero"
                class="size-full object-cover"
              />
            </figure>
          </div>
        </div>

        <div
          data-opai-animate
          data-delay="0.3"
          data-instant
          class="bg-background-6 w-full flex-1 rounded-lg p-6 sm:p-8 md:p-11 lg:min-h-[577px] lg:w-1/2 xl:w-full xl:max-w-[460px]"
        >
          <form>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label
                for="email"
                class="text-tagline-2 block font-normal text-white/90"
                >Your email</label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 focus-visible:border-stroke-1/50 block w-full rounded-md border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label
                for="password"
                class="text-tagline-2 block font-normal text-white/90"
                >Password</label
              >
              <input
                type="email"
                id="password"
                name="password"
                placeholder="At least 8 character"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 focus-visible:border-stroke-1/50 block w-full rounded-md border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label
                for="confirm-password"
                class="text-tagline-2 block font-normal text-white/90"
                >Confirm Password</label
              >
              <input
                type="email"
                id="confirm-password"
                name="confirm-password"
                placeholder="At least 8 character"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 focus-visible:border-stroke-1/50 block w-full rounded-md border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>

            <button
  type="submit"
  class="group bg-background-7 hover:border-stroke-3 w-full !py-2.5 relative flex items-center justify-center gap-2 overflow-hidden rounded-xl border border-transparent px-6 py-[13px] transition-all duration-300 ease-in-out"
>
  <div class="h-full max-h-5 overflow-hidden">
    <span
      class="font-ibm-plex-mono text-background-13/90 text-tagline-2 block -translate-y-0.5 leading-[1.4] font-medium text-nowrap transition-transform duration-500 ease-in-out group-hover:-translate-y-[105%]"
    >
      Sign up
    </span>
    <span
      class="font-ibm-plex-mono text-tagline-2 block leading-[1.4] font-medium text-nowrap transition-transform duration-500 ease-in-out group-hover:-translate-y-[105%]"
    >
      Sign up
    </span>
  </div>

  <div class="relative mt-[1.5px] flex size-6 items-center justify-center overflow-hidden">
    <!-- circle  -->
    <span
      class="bg-background-6 absolute size-[22px] translate-x-0 rounded-full transition-all duration-400 ease-in-out"
    >
      <!-- arrow   -->
      <span
        class="stroke-background-10 absolute size-[16px] -translate-x-[8px] translate-y-0.5 scale-95 stroke-2 transition-all duration-400 ease-in-out group-hover:translate-x-6"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
        >
          <path d="M6.75 13.5L11.25 9L6.75 4.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
    </span>

    <!-- arrow   -->
    <span
      class="stroke-background-10 absolute size-[18px] -translate-x-6 stroke-2 transition-all duration-400 ease-in-out group-hover:translate-x-0"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 18 18"
        fill="none"
      >
        <path d="M6.75 13.5L11.25 9L6.75 4.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </div>
</button>

            <p
              class="text-tagline-3 mt-4 text-center font-normal text-white/60"
            >
              Forget your password? Reset
              <a
                href="/login"
                class="font-medium text-white/90 underline underline-offset-2 hover:text-white"
                >here</a
              >
            </p>
          </form>
          <div class="py-6">
            <p
              class="text-tagline-4 relative px-2 text-center font-normal text-white/90 before:absolute before:top-1/2 before:left-[30%] before:block before:h-[1px] before:w-[43px] before:-translate-y-1/2 before:bg-[linear-gradient(270deg,rgba(210,223,240,0.40)_0%,rgba(210,223,240,0.00)_78.71%)] before:content-[''] after:absolute after:top-1/2 after:right-[30%] after:block after:h-[1px] after:w-[43px] after:-translate-y-1/2 after:rotate-180 after:bg-[linear-gradient(270deg,rgba(210,223,240,0.40)_0%,rgba(210,223,240,0.00)_78.71%)] after:content-[''] max-[376px]:before:left-[26%] max-[376px]:after:right-[26%] sm:before:left-[33%] sm:after:right-[33%] md:before:left-[40%] md:after:right-[40%] lg:before:left-[29%] lg:after:right-[29%] xl:before:left-[33%] xl:after:right-[33%]"
            >
              Or
            </p>
          </div>
          <div class="space-y-4 md:space-y-6">
            <a
              href="#"
              class="border-stroke-3/25 hover:bg-stroke-3/25 group flex w-full items-center justify-center gap-2 rounded-md border px-8 py-3 transition-all duration-300 ease-in-out"
            >
              <span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <path
                    d="M21.7541 12.2199C21.7541 11.4182 21.6878 10.8332 21.5441 10.2266H12.2031V13.8449H17.6861C17.5756 14.744 16.9786 16.0982 15.6521 17.0082L15.6335 17.1293L18.5869 19.3715L18.7915 19.3916C20.6708 17.6907 21.7541 15.1882 21.7541 12.2199Z"
                    fill="#4285F4"
                  />
                  <path
                    d="M12.2002 21.7514C14.8864 21.7514 17.1415 20.8847 18.7886 19.3897L15.6492 17.0063C14.8091 17.5805 13.6815 17.9813 12.2002 17.9813C9.56932 17.9813 7.33635 16.2805 6.54036 13.9297L6.42369 13.9394L3.35266 16.2686L3.3125 16.378C4.94853 19.563 8.30907 21.7514 12.2002 21.7514Z"
                    fill="#34A853"
                  />
                  <path
                    d="M6.53907 13.9306C6.32904 13.3239 6.20749 12.6739 6.20749 12.0023C6.20749 11.3305 6.32904 10.6806 6.52802 10.0739L6.52246 9.94471L3.41294 7.57812L3.3112 7.62555C2.63691 8.94723 2.25 10.4314 2.25 12.0023C2.25 13.5731 2.63691 15.0572 3.3112 16.3789L6.53907 13.9306Z"
                    fill="#FBBC05"
                  />
                  <path
                    d="M12.2003 6.01997C14.0685 6.01997 15.3286 6.8108 16.0472 7.47168L18.855 4.785C17.1306 3.21417 14.8865 2.25 12.2003 2.25C8.3091 2.25 4.94854 4.43832 3.3125 7.62329L6.52933 10.0717C7.33638 7.72083 9.56936 6.01997 12.2003 6.01997Z"
                    fill="#EB4335"
                  />
                </svg>
              </span>
              <span class="text-tagline-3 font-normal text-white/90"
                >Continue with Google</span
              >
            </a>
            <a
              href="#"
              class="border-stroke-3/25 hover:bg-stroke-3/25 group flex w-full items-center justify-center gap-2 rounded-md border px-8 py-3 transition-all duration-300 ease-in-out"
            >
              <span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <path
                    d="M22.5 12.0642C22.5 6.22974 17.799 1.5 12 1.5C6.20101 1.5 1.5 6.22974 1.5 12.0642C1.5 17.337 5.33968 21.7075 10.3594 22.5V15.1179H7.69336V12.0642H10.3594V9.73675C10.3594 7.08911 11.927 5.62663 14.3254 5.62663C15.4738 5.62663 16.6758 5.83296 16.6758 5.83296V8.43274H15.3518C14.0475 8.43274 13.6406 9.24713 13.6406 10.0834V12.0642H16.5527L16.0872 15.1179H13.6406V22.5C18.6603 21.7075 22.5 17.337 22.5 12.0642Z"
                    fill="#0C63D4"
                  />
                </svg>
              </span>
              <span class="text-tagline-3 font-normal text-white/90"
                >Continue with facebook</span
              >
            </a>
          </div>

          <p class="text-tagline-3 mt-4 text-center font-normal text-white/60">
            Already have an account?
            <a
              href="/login"
              class="font-medium text-white/90 underline underline-offset-2 hover:text-white"
              >Log in</a
            >
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

    </main>
