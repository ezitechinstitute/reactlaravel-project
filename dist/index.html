    <!-- Theme apply before render -->
    <script>
      (function(){
        try{
          var t=localStorage.getItem('ezitech-theme');
          if(t==='light'){document.documentElement.classList.add('light-theme');}
          else{document.documentElement.classList.add('dark');}
        }catch(e){}
      })();
    </script>
